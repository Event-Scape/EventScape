<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MapIT | MICE Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"/>
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet"/>
  <link rel="stylesheet" href="./styles.css"/>
</head>
<body id="body">
<div id="map"></div>

<!-- LOGIN -->
<div id="ls">
  <div class="au" style="width:420px;padding:44px 40px 36px;background:rgba(13,21,37,.9);border:1px solid var(--bd);border-radius:28px;backdrop-filter:blur(22px);">
    <div style="font-size:30px;font-weight:900;letter-spacing:-.04em;margin-bottom:3px;">Map<span style="color:var(--blue2)">IT</span></div>
    <div style="font-size:11px;color:var(--t3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:30px;">MICE 교육 플랫폼</div>
    <div id="lerr" style="background:rgba(255,79,107,.12);border:1px solid rgba(255,79,107,.3);border-radius:10px;padding:9px 13px;font-size:12.5px;color:#ff7891;margin-bottom:13px;display:none;"></div>
    <div style="margin-bottom:13px;"><label class="fl">이름</label><input id="li-n" class="fi" placeholder="예: 김철수"/></div>
    <div style="margin-bottom:22px;"><label class="fl">학번 / 교번</label><input id="li-i" class="fi mono" placeholder="예: 2024001" onkeydown="if(event.key==='Enter')login()"/></div>
    <button class="btn bb" style="width:100%;padding:13px;font-size:14px;border-radius:13px;" onclick="login()">로그인 →</button>
    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--bd);font-size:11px;color:var(--t3);text-align:center;line-height:1.8;">
      ※ 등록된 명단과 이름·학번이 일치해야 로그인됩니다<br/>
      교수 예시: <span class="mono" style="color:var(--t2)">김교수 / P0001</span>&nbsp;·&nbsp;
      학생 예시: <span class="mono" style="color:var(--t2)">김철수 / 2024001</span>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar" id="sl">
    <!-- Logo -->
    <div style="padding:18px 16px 13px;border-bottom:1px solid var(--bd);flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:13px;">
        <div style="width:30px;height:30px;border-radius:8px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;">🌍</div>
        <span style="font-size:15px;font-weight:900;letter-spacing:-.03em;">Map<span style="color:var(--blue2)">IT</span></span>
        <span style="margin-left:auto;font-size:8px;font-weight:800;background:var(--gold);color:#000;padding:2px 6px;border-radius:99px;letter-spacing:.06em;">BETA</span>
      </div>
      <!-- Profile -->
      <div class="card" style="display:flex;align-items:center;gap:9px;padding:9px 11px;">
        <div id="av" style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#7c3aed);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;"></div>
        <div style="min-width:0;">
          <div id="un" style="font-size:12.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
          <div id="ur" style="font-size:10px;color:var(--t3);font-weight:600;"></div>
        </div>
        <div style="width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;margin-left:auto;"></div>
      </div>
    </div>

    <!-- Nav -->
    <div style="padding:10px 9px;flex:1;overflow-y:auto;" class="scroll">
      <div class="ni on" onclick="navSec('my',this)"><span style="font-size:15px;width:20px;text-align:center;">👤</span>마이페이지</div>
      <div class="ni" onclick="navSec('no',this)">
        <span style="font-size:15px;width:20px;text-align:center;">🔔</span>알림함
        <span class="nib" id="nb">3</span>
      </div>
      <!-- Chat toggle -->
      <div class="ni" onclick="togChat(this)" style="justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:9px;"><span style="font-size:15px;width:20px;text-align:center;">💬</span><span>채팅</span></div>
        <span id="cc" style="font-size:10px;color:var(--t3);transition:transform .2s;">▾</span>
      </div>
      <div id="csub" style="overflow:hidden;max-height:0;transition:max-height .25s ease;display:flex;flex-direction:column;gap:1px;">
        <div class="ni" style="padding-left:30px;font-size:12px;" onclick="openChat('1on1')">
          <span style="color:var(--t3);font-size:11px;">↳</span><span id="cl1">1:1 채팅</span>
        </div>
        <div class="ni" style="padding-left:30px;font-size:12px;" onclick="openChat('team')">
          <span style="color:var(--t3);font-size:11px;">↳</span><span>팀 채팅</span>
        </div>
      </div>

      <div class="divider" style="margin:10px 3px;"></div>

      <div style="display:flex;align-items:center;justify-content:space-between;padding:0 7px 7px;">
        <span id="tl" style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;">등록된 팀</span>
        <button id="atb" onclick="addTeam()" style="display:none;background:none;color:var(--blue2);font-size:11px;font-weight:700;padding:2px 6px;border-radius:6px;border:1px solid var(--bd);">+ 팀 등록</button>
      </div>
      <div id="tlist" style="display:flex;flex-direction:column;gap:1px;"></div>
    </div>

    <!-- Bottom -->
    <div style="padding:11px 13px;border-top:1px solid var(--bd);flex-shrink:0;">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:9px;">
        <div class="tgl" id="tg" onclick="togTheme()"><div class="tgk"></div></div>
        <span id="tglabel" style="font-size:12px;font-weight:600;color:var(--t2);">다크 모드</span>
      </div>
      <button class="btn bg" style="width:100%;font-size:12px;padding:8px;" onclick="logout()">로그아웃</button>
    </div>
  </aside>

  <!-- RIGHT RANKING -->
  <aside class="sidebar" id="sr">
    <div style="padding:18px 16px 13px;border-bottom:1px solid var(--bd);flex-shrink:0;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:13px;font-weight:800;">인기 프로젝트</div>
          <div style="font-size:10px;color:var(--t3);font-weight:600;letter-spacing:.07em;text-transform:uppercase;margin-top:2px;">❤️ 좋아요 기준 랭킹</div>
        </div>
        <span style="font-size:22px;">🏆</span>
      </div>
    </div>
    <div id="rl" style="flex:1;overflow-y:auto;padding:10px 10px;" class="scroll"></div>
    <div style="padding:12px 13px;border-top:1px solid var(--bd);flex-shrink:0;">
      <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px;">지도 스타일</div>
      <div style="display:flex;flex-direction:column;gap:5px;">
        <button class="msb on" id="msb-dark"      onclick="setStyle('dark')">🌙 다크</button>
        <button class="msb"    id="msb-light"     onclick="setStyle('light')">☀️ 라이트</button>
        <button class="msb"    id="msb-satellite" onclick="setStyle('satellite')">🛰️ 위성</button>
      </div>
    </div>
  </aside>

  <!-- BOTTOM CARD -->
  <div id="bc" style="background:rgba(13,21,37,.92);backdrop-filter:blur(22px);border:1px solid var(--bd);">
    <div style="padding:16px 18px;display:flex;align-items:center;gap:13px;position:relative;">
      <button onclick="closeCard()" style="position:absolute;top:9px;right:11px;background:none;color:var(--t3);font-size:14px;line-height:1;transition:color .15s;" onmouseover="this.style.color='var(--t1)'" onmouseout="this.style.color='var(--t3)'">✕</button>
      <div id="bci" style="width:46px;height:46px;border-radius:12px;background:var(--bglow);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">
          <span id="bct" class="tag tb">TYPE</span>
          <span id="bcl" style="font-size:11px;color:var(--t3);font-weight:600;"></span>
        </div>
        <div id="bcti" style="font-size:17px;font-weight:800;letter-spacing:-.025em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
        <div style="display:flex;align-items:center;gap:9px;margin-top:2px;">
          <span id="bctm" style="font-size:11.5px;color:var(--t2);font-weight:700;"></span>
          <span id="bcm"  style="font-size:11px;color:var(--t3);"></span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
        <button onclick="openDetail()" class="btn bb" style="font-size:12px;padding:8px 14px;white-space:nowrap;">기획 상세보기</button>
        <button onclick="togLike()" id="bcl2" class="bl" style="justify-content:center;">❤️ <span id="bcv">0</span></button>
      </div>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div id="pd">
    <div style="padding:17px 17px 13px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;">Project Detail</span>
      <button onclick="closeDet()" style="background:none;color:var(--t3);font-size:16px;line-height:1;transition:color .15s;" onmouseover="this.style.color='var(--t1)'" onmouseout="this.style.color='var(--t3)'">✕</button>
    </div>
    <div id="ds" style="flex:1;overflow-y:auto;padding:16px;" class="scroll">
      <div id="dh" style="margin-bottom:16px;"></div>
      <div id="di" style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px;"></div>
      <div style="margin-bottom:16px;">
        <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--bd);">첨부 파일</div>
        <div id="df" style="display:flex;flex-direction:column;gap:5px;"></div>
      </div>
      <div id="pe" style="margin-bottom:16px;display:none;">
        <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--bd);">전문가 평가 (교수 전용)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
          <button onclick="evalProj('창의성')"   class="btn bg" style="flex-direction:column;gap:4px;padding:13px 8px;font-size:11.5px;">💡<span>창의성 평가</span></button>
          <button onclick="evalProj('실현가능성')" class="btn bg" style="flex-direction:column;gap:4px;padding:13px 8px;font-size:11.5px;">✅<span>실현가능성</span></button>
        </div>
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--bd);">피드백</div>
        <div id="fbl" style="display:flex;flex-direction:column;gap:7px;"></div>
      </div>
    </div>
    <div style="padding:11px 13px;border-top:1px solid var(--bd);flex-shrink:0;">
      <div style="display:flex;gap:7px;align-items:center;">
        <input id="fbi" class="fi" style="flex:1;padding:9px 12px;" placeholder="피드백 남기기..." onkeydown="if(event.key==='Enter')addFb()"/>
        <button onclick="togDetLike()" id="dll" class="bl" style="flex-shrink:0;padding:8px 11px;">❤️ <span id="dlv">0</span></button>
        <button onclick="addFb()" class="btn bb" style="flex-shrink:0;padding:9px 12px;">→</button>
      </div>
    </div>
  </div>

  <!-- CHAT PANEL -->
  <div id="cp">
    <div style="padding:13px 15px 11px;border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div id="ctit" style="font-size:13px;font-weight:800;">💬 채팅</div>
        <div id="csub2" style="font-size:10.5px;color:var(--t3);font-weight:600;margin-top:1px;"></div>
      </div>
      <button onclick="closeChat()" style="background:none;color:var(--t3);font-size:15px;line-height:1;">✕</button>
    </div>
    <!-- Tab bar -->
    <div style="display:flex;border-bottom:1px solid var(--bd);flex-shrink:0;">
      <button id="tab-list" onclick="chatTab('list')" style="flex:1;padding:8px 0;font-size:12px;font-weight:700;background:var(--bglow);color:var(--blue2);border:none;border-bottom:2px solid var(--blue);font-family:inherit;">목록</button>
      <button id="tab-room" onclick="chatTab('room')" style="flex:1;padding:8px 0;font-size:12px;font-weight:700;background:none;color:var(--t2);border:none;border-bottom:2px solid transparent;font-family:inherit;display:none;">채팅방</button>
    </div>
    <!-- List -->
    <div id="cv-list" style="flex:1;overflow-y:auto;padding:9px;" class="scroll"><div id="crooms"></div></div>
    <!-- Room -->
    <div id="cv-room" style="display:none;flex:1;overflow-y:auto;padding:11px 13px;" class="scroll"><div id="cmsgs"></div></div>
    <!-- Input -->
    <div id="cinput" style="display:none;padding:9px 11px;border-top:1px solid var(--bd);flex-shrink:0;display:flex;gap:7px;">
      <input id="cmi" class="fi" style="flex:1;padding:8px 11px;" placeholder="메시지 입력..." onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button onclick="sendMsg()" class="btn bb" style="flex-shrink:0;padding:8px 12px;">→</button>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div id="mr">
    <div style="width:100%;max-width:500px;background:var(--s1);border:1px solid var(--bd);border-radius:24px;overflow:hidden;">
      <div style="padding:19px 21px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;">
        <div style="font-size:15px;font-weight:800;">🚀 MICE 기획 등록</div>
        <button onclick="closeMod()" style="background:none;color:var(--t3);font-size:16px;line-height:1;">✕</button>
      </div>
      <div style="padding:19px 21px;display:flex;flex-direction:column;gap:12px;max-height:80vh;overflow-y:auto;" class="scroll">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
          <div class="card" style="padding:9px 12px;"><div class="fl">위도 LAT</div><input id="ml" readonly class="mono" style="background:none;border:none;color:var(--t2);font-size:12px;width:100%;"/></div>
          <div class="card" style="padding:9px 12px;"><div class="fl">경도 LNG</div><input id="mg" readonly class="mono" style="background:none;border:none;color:var(--t2);font-size:12px;width:100%;"/></div>
        </div>
        <div><label class="fl">프로젝트명</label><input id="mt" class="fi" placeholder="예: 2026 글로벌 AI 컨벤션"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
          <div><label class="fl">팀 이름</label><input id="mtm" class="fi" placeholder="A팀"/></div>
          <div><label class="fl">행사 유형</label><select id="mty" class="fi" style="cursor:pointer;"><option>Convention</option><option>Exhibition</option><option>Meeting</option><option>Incentive</option></select></div>
        </div>
        <div><label class="fl">팀 구성원 (쉼표 구분)</label><input id="mmb" class="fi" placeholder="홍길동, 김철수"/></div>
        <div><label class="fl">프로젝트 주제</label><input id="mto" class="fi" placeholder="예: 생성형 AI와 미래 컨벤션"/></div>
        <div><label class="fl">프로젝트 분야</label><input id="mfi" class="fi" placeholder="예: ICT / 인공지능"/></div>
        <div><label class="fl">장소 세부 설명</label><input id="mld" class="fi" placeholder="예: Seoul COEX Hall A"/></div>
        <div><label class="fl">기획 내용</label><textarea id="mde" class="fi" rows="3" placeholder="지리학적 이점과 주요 프로그램을 기술해 주세요."></textarea></div>
        <div><label class="fl">예상 규모 (명)</label><input id="msc" type="number" class="fi" placeholder="500"/></div>
        <button onclick="saveProj()" class="btn bb" style="width:100%;padding:13px;font-size:14px;border-radius:12px;">지도에 기획 게시 →</button>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header style="position:fixed;top:0;left:var(--sw);right:var(--rw);z-index:30;padding:0 18px;height:60px;display:flex;align-items:center;justify-content:flex-end;pointer-events:none;">
    <button id="regbtn" onclick="openMod()" class="btn bb" style="pointer-events:all;font-size:12.5px;display:none;">🚀 기획 등록</button>
  </header>

</div><!-- /#app -->

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./env.js"></script>
<script src="./config.js"></script>
<script src="./app.js"></script>
</body>
</html>
